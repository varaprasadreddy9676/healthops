# HealthOps Demo Environment Docker Compose
#
# QUICK START:
#   docker compose -f compose.demo.yaml up -d
#   Open: http://localhost:18080
#   Login: admin / healthops-demo-admin
#
# This demo environment includes:
#   - HealthOps monitoring service with auto-remediation
#   - MongoDB for persistence
#   - MySQL database with active workload
#   - Demo API (checkout service with synthetic failures)
#   - Local demo AI provider (mock RCA)
#   - Multiple demo servers (Linux containers with SSH)
#   - Nginx, Redis, log emitters (full microservices-like setup)
#
# CLEANUP:
#   docker compose -f compose.demo.yaml down -v
#
# NOTE: This is a DEMO environment. For production, use compose.yaml instead.

name: healthops-demo

services:
  # HealthOps monitoring service - preloaded with demo checks and auto-remediation
  healthops:
    build: .
    ports:
      - "${HEALTHOPS_DEMO_BIND:-127.0.0.1}:${HEALTHOPS_PORT:-18080}:8080"
    environment:
      # Use demo configuration with pre-seeded checks, servers, and remediation actions
      CONFIG_PATH: /app/config/demo.json
      DATA_DIR: /app/data
      FRONTEND_DIR: /app/frontend/dist
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-healthops}
      MONGODB_COLLECTION_PREFIX: ${MONGODB_COLLECTION_PREFIX:-healthops}
      # MySQL monitor DSN - connects to demo MySQL instance
      MYSQL_DSN: ${MYSQL_USER:-healthops}:${MYSQL_PASSWORD:-healthops123}@tcp(mysql:3306)/healthops?timeout=3s&readTimeout=5s&writeTimeout=5s&parseTime=true
      # Demo admin credentials (pre-configured)
      HEALTHOPS_BOOTSTRAP_ADMIN_PASSWORD: ${HEALTHOPS_DEMO_ADMIN_PASSWORD:-healthops-demo-admin}
      HEALTHOPS_BOOTSTRAP_ADMIN_EMAIL: demo@healthops.local
      HEALTHOPS_BOOTSTRAP_ADMIN_RESET: "true"
      # Auto-wire the local mock AI provider for demo RCA
      HEALTHOPS_BOOTSTRAP_AI_PROVIDER_ID: local-demo-ai
      HEALTHOPS_BOOTSTRAP_AI_PROVIDER_NAME: Local Demo AI
      HEALTHOPS_BOOTSTRAP_AI_PROVIDER_TYPE: custom
      HEALTHOPS_BOOTSTRAP_AI_PROVIDER_API_KEY: demo-local-key
      HEALTHOPS_BOOTSTRAP_AI_PROVIDER_BASE_URL: http://demo-ai-provider:9200/v1
      HEALTHOPS_BOOTSTRAP_AI_PROVIDER_MODEL: healthops-demo-ops-model
      HEALTHOPS_BOOTSTRAP_AI_PROVIDER_RESET: "true"
    volumes:
      - healthops_demo_data:/app/data
      - ./backend/config/demo.json:/app/config/demo.json:ro
    depends_on:
      mongo:
        condition: service_healthy
      mysql:
        condition: service_healthy
      nginx:
        condition: service_healthy
      redis:
        condition: service_healthy
      echo-server:
        condition: service_started
      demo-api:
        condition: service_healthy
      demo-ai-provider:
        condition: service_healthy
      linux-server-1:
        condition: service_healthy
      linux-server-2:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # MongoDB persistence - required for all state (checks, incidents, results, AI queue)
  mongo:
    image: mongo:7
    volumes:
      - mongo_demo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0
    ports:
      - "127.0.0.1:${MYSQL_PORT:-13306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass123}
      MYSQL_DATABASE: healthops
      MYSQL_USER: ${MYSQL_USER:-healthops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-healthops123}
    volumes:
      - mysql_demo_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Nginx web server - serves demo static content
  # HealthOps checks this service for HTTP availability
  nginx:
    build: ./docker/nginx-demo
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:80/" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # Redis cache - used by demo-api for session storage
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # Echo server - simple HTTP service for basic connectivity testing
  echo-server:
    image: hashicorp/http-echo
    command: [ "-text=healthy", "-listen=:9000" ]
    restart: unless-stopped
    # NOTE: hashicorp/http-echo is a scratch image with no shell/wget/nc, so
    # an exec-based healthcheck is not possible. The healthops `echo-server`
    # API check covers liveness from outside the container.

    # Demo API (Checkout Service) - simulates production API with synthetic failures
    # HealthOps runs synthetic checkout tests and log ingestion against this service
  demo-api:
    build: ./docker/demo-api
    ports:
      - "127.0.0.1:${DEMO_API_PORT:-19100}:9100"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9100/health', timeout=2).read()" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Demo AI Provider - mock OpenAI-compatible service for demo RCA analysis
  # Returns demo-appropriate root-cause hypotheses for all incident types
  demo-ai-provider:
    build: ./docker/demo-ai-provider
    environment:
      DEMO_AI_MODEL: healthops-demo-ops-model
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9200/health', timeout=2).read()" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Log Emitter - sends simulated application logs to HealthOps for ingestion
  # Demonstrates log-based alerting (error families, patterns, exceptions)
  demo-log-emitter:
    build: ./docker/demo-log-emitter
    environment:
      HEALTHOPS_URL: http://healthops:8080
      HEALTHOPS_USERNAME: admin
      HEALTHOPS_PASSWORD: ${HEALTHOPS_DEMO_ADMIN_PASSWORD:-healthops-demo-admin}
      BATCH_INTERVAL_SECONDS: 15
    depends_on:
      healthops:
        condition: service_healthy
    restart: unless-stopped

  # MySQL Workload Generator - continuous synthetic transactions on demo MySQL
  # Demonstrates MySQL monitoring and slow-query alerting
  mysql-workload:
    image: mysql:8.0
    command: [ "sh", "/demo/workload.sh" ]
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${MYSQL_USER:-healthops}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-healthops123}
      MYSQL_DATABASE: healthops
      WORKLOAD_INTERVAL_SECONDS: 8
    volumes:
      - ./docker/mysql-workload/workload.sh:/demo/workload.sh:ro
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
  # Demo Linux Server 1 - SSH target for remote process/command checks
  # Demonstrates SSH connectivity and auto-remediation (restart nginx, etc.)
  linux-server-1:
    build: ./docker/linux-server
    ports:
      - "127.0.0.1:${DEMO_LINUX_SSH_PORT_1:-12222}:22"
    environment:
      HTTP_PORT: 8000
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pgrep", "-x", "sshd" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Demo Linux Server 2 - Secondary SSH target for high-availability patterns
  # Demonstrates incident correlation across multiple servers
  linux-server-2:
    build: ./docker/linux-server
    ports:
      - "127.0.0.1:${DEMO_LINUX_SSH_PORT_2:-12223}:22"
    environment:
      HTTP_PORT: 9000
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pgrep", "-x", "sshd" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  healthops_demo_data:
  mongo_demo_data:
  mysql_demo_data:
