# Demo stack with realistic monitoring targets
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.demo.yml up -d
#
# This extends the base stack with demo services so you can see
# HealthOps monitoring real infrastructure out of the box:
#   - nginx (web server on port 8081)
#   - MySQL (database on port 3306)
#   - Redis (cache on port 6379)
#   - echo-server (API endpoint on port 9000)
#
# HealthOps will use config/demo.json instead of default.json,
# which has checks pre-configured for all demo services.

services:
  healthops:
    environment:
      - CONFIG_PATH=/app/config/demo.json
      - MYSQL_DSN=healthops:healthops123@tcp(mysql:3306)/healthops
    volumes:
      - ./backend/config/demo.json:/app/config/demo.json:ro
    depends_on:
      mongo:
        condition: service_started
      mysql:
        condition: service_healthy
      nginx:
        condition: service_started
      redis:
        condition: service_started
      echo-server:
        condition: service_started

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass123
      - MYSQL_DATABASE=healthops
      - MYSQL_USER=healthops
      - MYSQL_PASSWORD=healthops123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass123"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx-demo/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx-demo/index.html:/usr/share/nginx/html/index.html:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  echo-server:
    image: hashicorp/http-echo
    command: ["-text=healthy", "-listen=:9000"]
    ports:
      - "9000:9000"
    restart: unless-stopped

volumes:
  mysql_data:
