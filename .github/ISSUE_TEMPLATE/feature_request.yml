name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Thanks for the suggestion!"

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: "Describe the problem or limitation you're facing"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How would you like it to work?"
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Health Checks
        - Notifications / Alerting
        - Incident Management
        - AI Analysis
        - MySQL Monitoring
        - SSH / Remote Servers
        - API
        - UI / Dashboard
        - Docker / Deployment
        - Other
    validations:
      required: true
