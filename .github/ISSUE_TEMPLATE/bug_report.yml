name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug! Please fill out the sections below."

  - type: input
    id: version
    attributes:
      label: HealthOps Version
      description: "What version are you running? Check the footer or run: docker inspect healthops-healthops-1 | grep -i version"
      placeholder: "e.g., 0.1.0 or commit SHA"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker Compose (production)
        - Docker Compose (demo)
        - Bare metal / binary
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "Clear description of the bug"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Run: docker compose logs healthops --tail=50"
      render: shell
