  # ─── BYOK AI Service ──────────────────────────────────────────────────────────

  /api/v1/ai/config:
    get:
      tags: [ai]
      summary: Get AI service configuration (API keys masked)
      operationId: getAIConfig
      responses:
        "200":
          description: Safe AI config view
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SafeAIConfigView"

    put:
      tags: [ai]
      summary: Update AI service settings
      operationId: updateAIConfig
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIConfigUpdate"
      responses:
        "200":
          description: Updated AI config
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SafeAIConfigView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ai/providers:
    get:
      tags: [ai]
      summary: List all configured AI providers (API keys masked)
      operationId: listAIProviders
      responses:
        "200":
          description: AI providers
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/SafeAIProviderView"

    post:
      tags: [ai]
      summary: Add a new AI provider
      operationId: createAIProvider
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderConfig"
      responses:
        "201":
          description: Provider created (API key masked in response)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SafeAIProviderView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ai/providers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Provider ID

    put:
      tags: [ai]
      summary: Update an existing AI provider
      operationId: updateAIProvider
      security:
        - basicAuth: []
      description: |
        If `apiKey` is empty or contains `****`, the existing encrypted key is preserved.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderConfig"
      responses:
        "200":
          description: Updated provider
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SafeAIProviderView"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [ai]
      summary: Remove an AI provider
      operationId: deleteAIProvider
      security:
        - basicAuth: []
      responses:
        "200":
          description: Provider deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ai/prompts:
    get:
      tags: [ai]
      summary: List all prompt templates (including built-in defaults)
      operationId: listAIPrompts
      responses:
        "200":
          description: Prompt templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AIPromptTemplate"

    post:
      tags: [ai]
      summary: Create a custom prompt template
      operationId: createAIPrompt
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIPromptTemplate"
      responses:
        "201":
          description: Prompt template created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AIPromptTemplate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/ai/prompts/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Prompt template ID

    put:
      tags: [ai]
      summary: Update a prompt template
      operationId: updateAIPrompt
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIPromptTemplate"
      responses:
        "200":
          description: Updated prompt template
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AIPromptTemplate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      tags: [ai]
      summary: Delete a prompt template
      operationId: deleteAIPrompt
      security:
        - basicAuth: []
      responses:
        "200":
          description: Prompt template deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          deleted:
                            type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ai/analyze/{incidentId}:
    post:
      tags: [ai]
      summary: Manually trigger AI analysis for a specific incident
      operationId: triggerAIAnalysis
      security:
        - basicAuth: []
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                providerId:
                  type: string
                  description: Use a specific provider (defaults to default provider)
                promptId:
                  type: string
                  description: Use a specific prompt template
      responses:
        "200":
          description: AI analysis result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AIAnalysisResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/ai/health:
    get:
      tags: [ai]
      summary: Check connectivity to all configured AI providers
      operationId: getAIProviderHealth
      responses:
        "200":
          description: Provider health status
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProviderHealth"

  /api/v1/ai/results/{incidentId}:
    get:
      tags: [ai]
      summary: Get AI analysis results for a specific incident
      operationId: getAIResults
      parameters:
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: AI analysis results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AIAnalysisResult"

  # ─── Data Export ──────────────────────────────────────────────────────────────

  /api/v1/export/mysql/samples:
    get:
      tags: [export]
      summary: Export MySQL samples as CSV or JSON
      operationId: exportMySQLSamples
      parameters:
        - name: checkId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: json
      responses:
        "200":
          description: MySQL samples export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
            text/csv:
              schema:
                type: string
                description: CSV with columns sampleId, checkId, timestamp, connections, maxConnections, threadsRunning, threadsConnected, slowQueries, questionsPerSec, uptimeSeconds

  /api/v1/export/incidents:
    get:
      tags: [export]
      summary: Export all incidents as CSV or JSON
      operationId: exportIncidents
      parameters:
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: json
      responses:
        "200":
          description: Incidents export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
            text/csv:
              schema:
                type: string
                description: CSV with columns id, checkId, checkName, type, status, severity, message, startedAt, resolvedAt

  /api/v1/export/results:
    get:
      tags: [export]
      summary: Export check results as CSV or JSON
      operationId: exportResults
      parameters:
        - $ref: "#/components/parameters/checkIdQuery"
        - $ref: "#/components/parameters/daysQuery"
        - name: format
          in: query
          schema:
            type: string
            enum: [csv, json]
            default: json
      responses:
        "200":
          description: Results export
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
            text/csv:
              schema:
                type: string
                description: CSV with columns id, checkId, name, type, server, application, status, healthy, durationMs, startedAt, finishedAt, message

  # ─── Prometheus Metrics ───────────────────────────────────────────────────────

  /metrics:
    get:
      tags: [metrics]
      summary: Prometheus metrics endpoint
      operationId: getMetrics
      description: |
        Returns Prometheus exposition format text. Available metrics:
        - `healthops_check_runs_total` (counter) — total check runs by check ID and status
        - `healthops_check_duration_seconds` (histogram) — check execution duration
        - `healthops_check_failures_total` (counter) — total check failures
        - `healthops_incidents_total` (counter) — total incidents by severity
        - `healthops_alerts_triggered_total` (counter) — total alerts triggered
        - `healthops_http_requests_total` (counter) — HTTP requests by method, path, status
        - `healthops_http_request_duration_seconds` (histogram) — HTTP request duration
      responses:
        "200":
          description: Prometheus exposition format
          content:
            text/plain:
              schema:
                type: string
