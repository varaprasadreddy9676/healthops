services:
  healthops:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/config/default.json
      - STATE_PATH=/app/data/state.json
      - DATA_DIR=/app/data
      - FRONTEND_DIR=/app/frontend/dist
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DATABASE=healthops
      - MONGODB_COLLECTION_PREFIX=healthops
    volumes:
      - healthops_data:/app/data
    depends_on:
      mongo:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mongo_data:
  healthops_data:
