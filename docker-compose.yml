version: '3.8'

services:
  healthmon:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/root/config/default.json
      - STATE_PATH=/root/data/state.json
      - MONGODB_URI=mongodb://mongo:27017
      - MONGODB_DATABASE=healthmon
      - AUTH_ENABLED=false
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=admin123
    volumes:
      - ./backend/data:/root/data
      - ./backend/config:/root/config
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
